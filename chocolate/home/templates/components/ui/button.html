<div class="{{ parent_class|default:'botton_ui' }}"
     style="justify-content: {{ align|default:'center' }};">
  {% if href %}
    <a href="{% url href %}"
    class="btn {{ btn_class }}{% if size != 'sm' and size != 'md' and size != 'lg' %}{% else %} btn-{{ size }}{% endif %}"
    style="
      {% if color|slice:":1" == '#' or color|slice:":4" == 'rgb(' %}background-color: {{ color }};{% endif %}
      {% if text_color|slice:":1" == '#' or text_color|slice:":4" == 'rgb(' %}color: {{ text_color }};{% endif %}
      {% if size != 'sm' and size != 'md' and size != 'lg' %}padding: {{ size }}; font-size: calc({{ size }} * 0.5);{% endif %}
      display: inline-block;
      text-align: center;
    ">
      {{ title_button }}
    </a>
  {% else %}
    <button
      class="btn {{ btn_class }}{% if size != 'sm' and size != 'md' and size != 'lg' %}{% else %} btn-{{ size }}{% endif %}"
       style="
       {% if color|slice:":1" == '#' or color|slice:":4" == 'rgb(' %}background-color: {{ color }};{% endif %}
       {% if text_color|slice:":1" == '#' or text_color|slice:":4" == 'rgb(' %}color: {{ text_color }};{% endif %}
       {% if size != 'sm' and size != 'md' and size != 'lg' %}padding: {{ size }}; font-size: calc({{ size }} * 0.5);{% endif %}
       display: inline-block;
       text-align: center;
       ">
      {{ title_button }}
    </button>
  {% endif %}
</div>
